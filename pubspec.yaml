name: event_app
description: "Sıcak içecek etkinlikleri için davet uygulaması (ücretsiz Firebase)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase (ücretsiz Spark planı ile uyumlu paketler)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3

  # State yönetimi
  provider: ^6.1.2

  # Fotoğraf seçme + sıkıştırma (base64 için)
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  # Konum (GPS) + ücretsiz interaktif harita (OpenStreetMap, kart gerektirmez)
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  url_launcher: ^6.3.1

  # Yerel bildirim (uygulama açıkken/foreground)
  flutter_local_notifications: ^17.2.3

  # Yardımcılar
  intl: ^0.19.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  # Uygulama ikonlarını (Android mipmap + iOS) otomatik üretir
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/event_images/

# Uygulama ikonu yapılandırması (dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  adaptive_icon_background: "assets/icon/app_icon_bg.png"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
